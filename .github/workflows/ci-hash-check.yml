name: Weight Hash

on:
  push:
    paths: ["model_small.onnx"]
  pull_request:
    paths: ["model_small.onnx"]

env:
  # TODO(pre-release): set to the SHA256 of weights/model_small.onnx and re-enable the verify step.
  # Compute with: python -c "import hashlib; print(hashlib.sha256(open('weights/model_small.onnx','rb').read()).hexdigest())"
  MODEL_HASH: ""

jobs:
  sha256:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify model checksum
        if: env.MODEL_HASH != ''
        run: |
          echo "${MODEL_HASH}  model_small.onnx" | sha256sum -c -
      - name: Skip (hash not set)
        if: env.MODEL_HASH == ''
        run: |
          echo "MODEL_HASH not set; skipping checksum verification. See env.MODEL_HASH TODO."
